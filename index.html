<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Nexus Study OS | Elite Wave</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        :root {
            --bg-black: #000000;
            --bg-base: #121212;
            --bg-surface: #1e1e1e;
            --bg-hover: #2a2a2a;
            --spotify-green: #1db954;
            --spotify-green-hover: #1ed760;
            --text-main: #ffffff;
            --text-dim: #b3b3b3;
            --border: #282828;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; background: var(--bg-black); color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: grid; grid-template-columns: 300px 1fr 300px;
            grid-template-rows: 1fr 95px; height: 100vh; overflow: hidden;
        }

        /* SIDEBARS */
        .sidebar { background: var(--bg-black); padding: 8px; display: flex; flex-direction: column; gap: 8px; overflow: hidden; }
        .card { background: var(--bg-base); border-radius: 12px; padding: 16px; transition: 0.3s; }
        
        /* PLAYLIST */
        .playlist-container { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .playlist-scroll { flex: 1; overflow-y: auto; margin-top: 12px; }
        .song-row { 
            display: grid; grid-template-columns: 32px 1fr 32px; align-items: center;
            padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; color: var(--text-dim);
        }
        .song-row:hover { background: var(--bg-hover); color: white; }
        .song-row.active { color: var(--spotify-green); background: rgba(29, 185, 84, 0.05); }

        /* EDITOR AREA */
        .main-workspace { background: linear-gradient(to bottom, #1e1e1e, #121212); border-radius: 12px; margin: 8px 0; display: flex; flex-direction: column; overflow: hidden; }
        .toolbar { padding: 12px 24px; display: flex; gap: 10px; align-items: center; background: rgba(0,0,0,0.2); backdrop-filter: blur(15px); }
        .editor-box { flex: 1; overflow-y: auto; padding: 40px 15%; }
        #editor { min-height: 100%; outline: none; line-height: 1.7; font-size: 1.15rem; color: #e0e0e0; }

        /* BUTTONS */
        .btn { 
            background: var(--bg-hover); border: none; color: white; padding: 10px 16px; 
            border-radius: 25px; font-size: 0.75rem; font-weight: 600; cursor: pointer;
        }
        .btn-green { background: var(--spotify-green); color: black; }
        .btn-green:hover { background: var(--spotify-green-hover); transform: scale(1.03); }

        /* PLAYER BAR */
        .player-bar { 
            grid-column: 1 / 4; background: var(--bg-black); display: grid; 
            grid-template-columns: 1fr 2fr 1fr; align-items: center; padding: 0 20px;
            border-top: 1px solid var(--border);
        }
        .play-btn { width: 35px; height: 35px; background: white; border-radius: 50%; color: black; border: none; cursor: pointer; font-size: 1rem; }

        .progress-bar { flex: 1; height: 4px; background: #4d4d4d; border-radius: 2px; position: relative; cursor: pointer; }
        .progress-fill { height: 100%; background: white; border-radius: 2px; width: 0%; }

        #t-display { font-size: 2.2rem; font-family: 'JetBrains Mono'; color: white; background: transparent; border: none; width: 100%; text-align: center; outline: none; }
        .hidden-ui { display: none !important; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="card">
            <h3 style="font-size: 0.7rem; color: var(--text-dim); margin-top: 0;">FOCUS TIMER</h3>
            <input type="text" id="t-display" value="25:00" onfocus="pauseTimer()" onblur="validateTime()">
            <div style="display:flex; gap:8px; margin-top:10px;">
                <button class="btn btn-green" onclick="toggleTimer()" id="t-btn" style="flex:1">START</button>
                <button class="btn" onclick="resetTimer()">↺</button>
            </div>
        </div>

        <div class="card playlist-container">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="font-size: 0.7rem; color: var(--text-dim); margin: 0;">MUSIK</h3>
                <div style="display:flex; gap:5px;">
                    <button class="btn" onclick="document.getElementById('m-up').click()" style="padding: 5px 12px;">+</button>
                    <button class="btn" onclick="exportLibrary()" title="Bibliothek Backup" style="background:#333;">💾</button>
                    <button class="btn" onclick="document.getElementById('lib-in').click()" title="Backup laden" style="background:#333;">📂</button>
                </div>
            </div>
            <input type="file" id="m-up" class="hidden-ui" multiple accept="audio/*" onchange="uploadLocal(event)">
            <input type="file" id="lib-in" class="hidden-ui" accept=".nexus" onchange="importLibrary(event)">
            <div id="playlist-list" class="playlist-scroll"></div>
        </div>
    </aside>

    <main class="main-workspace">
        <div class="toolbar">
            <button class="btn" onclick="document.getElementById('file-in').click()">Import Text</button>
            <input type="file" id="file-in" class="hidden-ui" onchange="importFile(event)">
            <button class="btn" onclick="cmd('bold')">B</button>
            <button class="btn" onclick="cmd('italic')">I</button>
            <button class="btn" onclick="cmd('insertUnorderedList')">Liste</button>
            <div style="margin-left:auto; display:flex; gap:10px; align-items:center;">
                <span id="word-count" style="font-size: 0.7rem; color: var(--text-dim);">0 Wörter</span>
                <button class="btn btn-green" onclick="exportDoc()">SESSION SICHERN</button>
            </div>
        </div>
        <div class="editor-box">
            <div id="editor" contenteditable="true" oninput="onEditorInput()">Dein Fokus-Journal...</div>
        </div>
    </main>

    <aside class="sidebar">
        <div class="card" style="flex:1; display:flex; flex-direction:column;">
            <h3 style="font-size: 0.7rem; color: var(--text-dim); margin-top: 0;">QUICK SCRATCHPAD</h3>
            <textarea id="ai-input" oninput="saveNotes()" style="flex:1; background:transparent; border:none; color:white; resize:none; outline:none; font-family:inherit;"></textarea>
        </div>
        <div class="card">
            <h3 style="font-size: 0.7rem; color: var(--text-dim); margin: 0;">SESSION ZEIT</h3>
            <div id="session-time" style="font-size: 1.1rem; font-family: 'JetBrains Mono'; margin-top:5px;">00:00:00</div>
        </div>
    </aside>

    <footer class="player-bar">
        <div style="display:flex; align-items:center; gap:12px;">
            <div style="width:48px; height:48px; background:#282828; border-radius:4px; display:flex; align-items:center; justify-content:center;">🎵</div>
            <div style="overflow:hidden;">
                <div id="track-name" style="font-size: 0.8rem; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:150px;">Kein Titel</div>
                <div style="font-size: 0.65rem; color: var(--text-dim);">iPad Library</div>
            </div>
        </div>

        <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
            <div style="display:flex; align-items:center; gap:20px;">
                <button onclick="prevTrack()" style="background:none; border:none; color:white; cursor:pointer;">⏮</button>
                <button class="play-btn" id="play-trigger" onclick="togglePlay()">▶</button>
                <button onclick="nextTrack()" style="background:none; border:none; color:white; cursor:pointer;">⏭</button>
            </div>
            <div style="display:flex; align-items:center; gap:10px; width:100%; max-width:450px;">
                <span style="font-size:0.6rem; color:var(--text-dim);" id="cur-t">0:00</span>
                <div class="progress-bar" onclick="seek(event)"><div id="prog-bar" class="progress-fill"></div></div>
                <span style="font-size:0.6rem; color:var(--text-dim);" id="dur-t">0:00</span>
            </div>
        </div>

        <div style="display:flex; justify-content:flex-end; align-items:center; gap:10px;">
            <span style="font-size:0.8rem;">🔊</span>
            <input type="range" style="width:80px;" oninput="audio.volume = this.value/100">
        </div>
    </footer>

    <audio id="main-audio" ontimeupdate="updateUI()" onended="nextTrack()" onplay="setPlayUI(true)" onpause="setPlayUI(false)"></audio>

    <script>
        let playlist = [], curIdx = 0, timer, timeLeft = 1500, db, sessionSeconds = 0;
        const audio = document.getElementById('main-audio');

        // DATABASE
        const req = indexedDB.open("NexusIPadDB", 2);
        req.onupgradeneeded = e => e.target.result.createObjectStore("songs", { keyPath: "name" });
        req.onsuccess = e => { db = e.target.result; loadFromDB(); };

        // MUSIC & BACKUP
        async function uploadLocal(e) {
            const files = Array.from(e.target.files);
            for(let f of files) {
                const tx = db.transaction("songs", "readwrite");
                tx.objectStore("songs").put({ name: f.name, data: f });
            }
            setTimeout(loadFromDB, 600);
            e.target.value = '';
        }

        async function exportLibrary() {
            const tx = db.transaction("songs", "readonly");
            tx.objectStore("songs").getAll().onsuccess = async (e) => {
                const songs = e.target.result;
                if(songs.length === 0) return alert("Bibliothek ist leer.");
                const data = JSON.stringify(await Promise.all(songs.map(async s => ({
                    name: s.name,
                    data: await fileToBase64(s.data)
                }))));
                saveAs(new Blob([data], {type: "application/json"}), "MeineMusik.nexus");
            };
        }

        function importLibrary(e) {
            const reader = new FileReader();
            reader.onload = async (f) => {
                const songs = JSON.parse(f.target.result);
                for(let s of songs) {
                    const blob = base64ToBlob(s.data);
                    const tx = db.transaction("songs", "readwrite");
                    tx.objectStore("songs").put({ name: s.name, data: blob });
                }
                setTimeout(loadFromDB, 800);
            };
            reader.readAsText(e.target.files[0]);
        }

        function fileToBase64(file) {
            return new Promise((resolve) => {
                const r = new FileReader();
                r.onload = () => resolve(r.result);
                r.readAsDataURL(file);
            });
        }

        function base64ToBlob(base64) {
            const parts = base64.split(';base64,');
            const byteCharacters = atob(parts[1]);
            const byteNumbers = new Array(byteCharacters.length);
            for (let i = 0; i < byteCharacters.length; i++) byteNumbers[i] = byteCharacters.charCodeAt(i);
            return new Blob([new Uint8Array(byteNumbers)], {type: parts[0].split(':')[1]});
        }

        function loadFromDB() {
            const tx = db.transaction("songs", "readonly");
            tx.objectStore("songs").getAll().onsuccess = e => {
                playlist = e.target.result.map(s => ({ name: s.name, url: URL.createObjectURL(s.data) }));
                renderPlaylist();
            };
        }

        function renderPlaylist() {
            document.getElementById('playlist-list').innerHTML = playlist.map((s, i) => `
                <div class="song-row ${i===curIdx?'active':''}" onclick="playTrack(${i})">
                    <span style="font-size:0.7rem;">${i+1}</span>
                    <span style="color:white; overflow:hidden; text-overflow:ellipsis;">${s.name}</span>
                    <span onclick="event.stopPropagation(); deleteSong('${s.name}')">✕</span>
                </div>
            `).join('');
        }

        function deleteSong(n) { db.transaction("songs", "readwrite").objectStore("songs").delete(n); loadFromDB(); }
        function playTrack(i) {
            if(!playlist[i]) return;
            curIdx = i;
            audio.src = playlist[i].url;
            audio.play();
            document.getElementById('track-name').innerText = playlist[i].name;
            renderPlaylist();
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
        function nextTrack() { playTrack((curIdx + 1) % playlist.length); }
        function prevTrack() { playTrack((curIdx - 1 + playlist.length) % playlist.length); }
        function setPlayUI(p) { document.getElementById('play-trigger').innerText = p ? "⏸" : "▶"; }
        function updateUI() {
            const p = (audio.currentTime / audio.duration) * 100;
            document.getElementById('prog-bar').style.width = p + "%";
            document.getElementById('cur-t').innerText = formatTime(audio.currentTime);
            document.getElementById('dur-t').innerText = formatTime(audio.duration);
        }
        function formatTime(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
        function seek(e) { audio.currentTime = ((e.clientX - e.currentTarget.getBoundingClientRect().left) / e.currentTarget.offsetWidth) * audio.duration; }

        // EDITOR & TIMER
        function onEditorInput() { saveNotes(); updateWordCount(); }
        function saveNotes() {
            localStorage.setItem('nexus_ipad_editor', document.getElementById('editor').innerHTML);
            localStorage.setItem('nexus_ipad_scratch', document.getElementById('ai-input').value);
        }
        function updateWordCount() {
            const t = document.getElementById('editor').innerText.trim();
            document.getElementById('word-count').innerText = (t ? t.split(/\s+/).length : 0) + " Wörter";
        }
        function cmd(c) { document.execCommand(c, false, null); onEditorInput(); }

        function toggleTimer() {
            if(timer) { clearInterval(timer); timer = null; document.getElementById('t-btn').innerText = "START"; }
            else {
                validateTime();
                timer = setInterval(() => { if(timeLeft > 0){ timeLeft--; updateTimerDisplay(); } else { resetTimer(); alert("Pause!"); } }, 1000);
                document.getElementById('t-btn').innerText = "PAUSE";
            }
        }
        function updateTimerDisplay() { let m=Math.floor(timeLeft/60), s=timeLeft%60; document.getElementById('t-display').value = `${m}:${s<10?'0':''}${s}`; }
        function resetTimer() { clearInterval(timer); timer = null; timeLeft = 1500; updateTimerDisplay(); document.getElementById('t-btn').innerText = "START"; }
        function validateTime() { const p = document.getElementById('t-display').value.split(':'); timeLeft = p.length === 2 ? (parseInt(p[0])*60)+parseInt(p[1]) : parseInt(p[0])*60; }

        function exportDoc() { saveAs(new Blob([`<html><body style="font-family:sans-serif;padding:40px;">${document.getElementById('editor').innerHTML}</body></html>`], {type: 'text/html'}), "Session.html"); }
        function importFile(e) { const r = new FileReader(); r.onload = f => { document.getElementById('editor').innerHTML = f.target.result; onEditorInput(); }; r.readAsText(e.target.files[0]); }

        window.onload = () => {
            document.getElementById('editor').innerHTML = localStorage.getItem('nexus_ipad_editor') || "Schreibe etwas...";
            document.getElementById('ai-input').value = localStorage.getItem('nexus_ipad_scratch') || "";
            setInterval(() => { sessionSeconds++; let h=Math.floor(sessionSeconds/3600), m=Math.floor((sessionSeconds%3600)/60), s=sessionSeconds%60; document.getElementById('session-time').innerText = `${h<10?'0':''}${h}:${m<10?'0':''}${m}:${s<10?'0':''}${s}`; }, 1000);
            updateWordCount();
        }
    </script>
</body>
</html>
